<svg width="680" height="270" viewBox="0 0 680 270" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Locked in logo</title>
<desc>A minimalist logo for the Locked In app: three schedule list rows, where the middle row is highlighted and its bullet marker is replaced with a small padlock, representing a task locked into the schedule, with a lowercase wordmark below.</desc>

<circle cx="250" cy="60" r="5" fill="#8A8880"/>
<line x1="270" y1="60" x2="400" y2="60" stroke="#B4B2A9" stroke-width="4" stroke-linecap="round"/>

<rect x="228" y="90" width="224" height="30" rx="8" fill="#F2A93B" fill-opacity="0.12"/>
<path d="M246,100 A4,4 0 0 1 254,100" fill="none" stroke="#F2A93B" stroke-width="1.6" stroke-linecap="round"/>
<rect x="244" y="100" width="12" height="10" rx="2" fill="#F2A93B"/>
<line x1="272" y1="105" x2="430" y2="105" stroke="#1A1A1A" stroke-width="4" stroke-linecap="round"/>

<circle cx="250" cy="150" r="5" fill="#8A8880"/>
<line x1="270" y1="150" x2="370" y2="150" stroke="#B4B2A9" stroke-width="4" stroke-linecap="round"/>

<text x="340" y="205" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="500" font-size="42" letter-spacing="3" fill="#1A1A1A">locked in</text>
<text x="340" y="235" text-anchor="middle" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="14" letter-spacing="5" fill="#6B6B65">STAY ON SCHEDULE</text>
</svg>
